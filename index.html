<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <script>
    const newBaseUrl = "https://witnesses-coming-quizzes-bones.trycloudflare.com/";
    const currentUrl = new URL(window.location.href);

    let pathAndQuery = "";

    // Jika ada parameter id
    if (currentUrl.searchParams.has("id")) {
      // arahkan ke /voting dengan query yang sama
      pathAndQuery = "voting" + currentUrl.search + currentUrl.hash;
    } else {
      // fallback: tetap ke path asli
      pathAndQuery = currentUrl.pathname + currentUrl.search + currentUrl.hash;
    }

    const newUrl = newBaseUrl + pathAndQuery.replace(/^\/+/, "");

    // Redirect tanpa menambah history
    window.location.replace(newUrl);
  </script>
</head>

<body>
  <p>
    Redirecting...
    <a id="link" href="#">Click here if not redirected</a>
  </p>

  <script>
    const newBaseUrl = "https://gba-exploration-specs-catalogue.trycloudflare.com/";
    const currentUrl = new URL(window.location.href);

    let fallbackPath = "";

    if (currentUrl.searchParams.has("id")) {
      fallbackPath = "voting" + currentUrl.search + currentUrl.hash;
    } else {
      fallbackPath = currentUrl.pathname + currentUrl.search + currentUrl.hash;
    }

    const fallbackUrl = newBaseUrl + fallbackPath.replace(/^\/+/, "");

    document.getElementById("link").href = fallbackUrl;
  </script>
</body>
</html>

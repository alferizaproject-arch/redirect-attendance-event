<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // Ubah ini saja untuk ganti domain depan
    const newBaseUrl = "https://watch-convertible-strategies-blessed.trycloudflare.com";

    // Ambil query string dan hash dari URL saat ini
    const pathAndQuery = window.location.pathname + window.location.search + window.location.hash;

    // Buat URL baru
    const newUrl = newBaseUrl + pathAndQuery;

    // Redirect
    window.location.href = newUrl;
  </script>
</head>
<body>
  <p>Redirecting... <a id="link" href="#">Click here if not redirected</a></p>
  <script>
    // fallback link
    document.getElementById('link').href = newBaseUrl + window.location.pathname + window.location.search + window.location.hash;
  </script>
</body>
</html>
